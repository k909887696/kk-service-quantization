server:
  port: 8001
spring:
  application:
    name: kk-api-quantization
    desc: 量化分析系统
    version: 1.0
  data:
    redis:
      host: ${auth-redis.host}
      port: ${auth-redis.port}
      password: ${auth-redis.password}
      database: ${auth-redis.database}
  cloud:
    #alibaba nacos setting
    nacos:
      #nacos 服务注册发现
      discovery:
        enabled: true
        namespace: kk_${spring.profiles.active}
        register-enabled: true
      config:
        file-extension: yaml
        prefix: ${spring.application.name}
        namespace: kk_${spring.profiles.active}
        group: DEFAULT_GROUP
        enabled: true
        # 引入共享配置
        shared-configs:
          - data-id: kk-api-common.yaml
            group: DEFAULT_GROUP
            refresh: true
logging:
  level:
    root=debug: INFO
  # 指定 Log4j2 配置文件
  config: classpath:log4j2.xml
# Elasticsearch 配置
business-es:
  primary: default
  nodes:
    default:
      host: http://192.168.90.103:9200
      username: elastic
      password: 123456
      connectTimeout: 5000
      socketTimeout: 30000
      connectionRequestTimeout: 5000

# 各站点独有的业务 Redis 配置依然保留在本地
business-redis:
  nodes:
    order:
      host: 192.168.90.44
      port: 6379
      password: RE9nJN0qefV7gE4O8tdw
      database: 1
    product:
      host: 192.168.90.44
      port: 6379
      password: RE9nJN0qefV7gE4O8tdw
      database: 2

# 登录redis配置
auth-redis:
  host: 192.168.90.44
  port: 6379
  password: RE9nJN0qefV7gE4O8tdw
  database: 0
  jwt-secret-key: nAGyUgIQHZMREuc03WsFceSQZ1PZIilR
sa-token:
  token-name: token      # 建议改为通用的 Authorization
  token-prefix:
  timeout: 86400              # token 有效期(秒)，默认1天
  is-concurrent: true            # 是否允许同一账号多地同时登录
  is-share: false                # 每次登录生成新 token
  token-style: simple-uuid       # token 风格 uuid：标准 UUID，例如 a1b2c3d4-e5f6-7890-... simple-uuid：去掉横杠的 UUID，例如 a1b2c3d4e5f67890... random-32 / random-64：随机生成的 32位或64位字符串
  is-read-cookie: false          # 【重要】前后端分离必须关闭 cookie 读取
  is-read-header: true           # 从 Header 中读取 Token
  jwt-secret-key: ${auth-redis.jwt-secret-key} # 从 Nacos 读取 JWT 密钥
