server:
  port: 8001
spring:
  application:
    name: kk-api-quantization
    desc: 量化分析系统
    version: 1.0
  datasource:
    name: mybatis_quantization
    #使用druid连接池
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    #配置基本属性
    url: jdbc:mysql://192.168.90.126:3309/quantization?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowMultiQueries=true
    username: hotel
    password: ^d4DD8$g,uccDB=F
    #druid相关配置
    druid:
      #监控统计拦截的filters
      filters: stat
      #配置初始化大小/最小/最大
      initial-size: 5
      min-idle: 5
      max-active: 30
      #获取连接等待超时时间
      max-wait: 60000
      #间隔多久进行一次检测，检测需要关闭的空闲连接
      time-between-eviction-runs-millis: 60000
      #一个连接在池中最小生存的时间
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 'x'
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      #打开PSCache，并指定每个连接上PSCache的大小。oracle设为true，mysql设为false。分库分表较多推荐设置为false
      pool-prepared-statements: false
      max-pool-prepared-statement-per-connection-size: 20
  main:
    #开启循环依赖
    allow-circular-references: true
    allow-bean-definition-overriding: true
  #解决2.6.0版本整合swagger报错问题 Failed to start bean 'documentationPluginsBootstrapper'
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1
  # spring boot 2 整合邮箱发送功能配置
  mail:
    default-encoding: UTF-8
    #发送邮件的账户
    username: 909887696@qq.com
    from: 909887696@qq.com
    # 授权码（获取方式前文已描述）
    password: ...
    # （邮箱服务器地址，获取方式前文已描述）
    # 163 邮箱是smtp.163.com
    # qq邮箱则为smtp.qq.com
    host: smtp.qq.com
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
    port: 25
  #cloud 配置整合
  cloud:
    #alibaba nacos setting
    nacos:
      #nacos 服务注册发现
      discovery:
        enabled: true
        namespace: kk_${spring.profiles.active}
        register-enabled: true
      config:
        file-extension: yaml
        prefix: ${spring.application.name}
        namespace: kk_${spring.profiles.active}
        group: DEFAULT_GROUP
        enabled: true
        # 引入共享配置
        shared-configs:
          - data-id: kk-api-common.yaml
            group: DEFAULT_GROUP
            refresh: true

mybatis-plus:
  # 以下配置均有默认值,可以不设置
  configuration:
    # 是否开启自动驼峰命名规则映射:从数据库列名到Java属性驼峰命名的类似映射
    map-underscore-to-camel-case: true
    # 如果查询结果中包含空值的列，则 MyBatis 在映射的时候，不会映射这个字段
    call-setters-on-nulls: true
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #全局超时时间 (秒)
    default-statement-timeout: 60
    #关闭一级缓存
    local-cache-scope: statement
  type-aliases-package: com.kk.business.quantization.dao.entity
  mapper-locations: classpath:/mapper/*xml

#自定义拦截器相关配置
custom-web-mvc-config:
  #参数拦截器 记录请求参数
  intercepter-parameter-pattern: /**

# ===== SpringDoc配置 =====#
springdoc:
  swagger-ui:
    # 自定义的文档界面访问路径。默认访问路径是/swagger-ui.html
    #path: /springdoc/docs.html

    # 字符串类型，一共三个值来控制操作和标记的默认展开设置。它可以是“list”（仅展开标记）、“full”（展开标记和操作）或“none”（不展开任何内容）。
    docExpansion: none

    # 布尔值。控制“试用”请求的请求持续时间（毫秒）的显示。
    displayRequestDuration: true

    # 布尔值。控制供应商扩展（x-）字段和操作、参数和架构值的显示。
    showExtensions: true

    # 布尔值。控制参数的扩展名（pattern、maxLength、minLength、maximum、minminimum）字段和值的显示。
    showCommonExtensions: true

    # 布尔值。禁用swagger用户界面默认petstore url。（从v1.4.1开始提供）。
    disable-swagger-default-url: true

  api-docs:
    # enabled the /v3/api-docs endpoint
    enabled: true

    # 自定义的文档api元数据访问路径。默认访问路径是/v3/api-docs
    path: /springdoc/api-docs

    # 布尔值。在@Schema（名称name、标题title和说明description，三个属性）上启用属性解析程序。
    resolve-schema-properties: true

  # 布尔值。实现OpenApi规范的打印。
  writer-with-default-pretty-printer: true
swagger:
  enable: true
  #swagger文档项目名称
  application-name: ${spring.application.name}-${spring.profiles.active}
  #swagger版本号
  application-version: ${spring.application.version}
  application-description: ${spring.application.desc}
logging:
  level:
    root=debug: INFO
# 指定 Log4j2 配置文件
  config: classpath:log4j2.xml
  file:
    path: logs/${spring.application.name}


