server:
  port: 8801
spring:
  application:
    name: kk-executor-quantization
  #cloud 配置整合
  cloud:
    #alibaba nacos setting
    nacos:
      #nacos 服务注册发现
      discovery:
        enabled: true
        namespace: kk_${spring.profiles.active}
        register-enabled: true
      config:
        file-extension: yaml
        prefix: ${spring.application.name}
        namespace: kk_${spring.profiles.active}
        group: DEFAULT_GROUP
        enabled: true
        # 引入共享配置
        shared-configs:
          - data-id: kk-api-common.yaml
            group: DEFAULT_GROUP
            refresh: true


